unbind r
bind r source-file ~/dotfiles/tmux/.tmux.conf

bind-key -T root C-a run-shell "/usr/local/bin/im-select com.apple.keylayout.ABC" \; switch-client -T prefix

set -g mouse on
set -g allow-passthrough on
set-option -g set-clipboard on
set -g default-terminal "tmux-256color"
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'


set-option -g status-position top
set -g base-index 1
set -g pane-base-index 1

bind-key x kill-pane
bind-key & kill-window
unbind %
bind-key | split-window -h -c "#{pane_current_path}"
unbind '"'
bind-key - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# Dim inactive panes
set -g window-style 'bg=#555555'
set -g window-active-style 'bg=#2b2b2b'

set -g @plugin 'tmux-plugins/tpm'

# List of plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/vim-tmux-focus-events'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_reset 'true'

# Reset stale Catppuccin colors before configuring custom theme options.
run '~/.tmux/plugins/tmux/catppuccin.tmux'
set -g @catppuccin_window_status_style 'rounded'
set -Ugq @catppuccin_window_current_left_separator
set -Ugq @catppuccin_window_current_middle_separator
set -Ugq @catppuccin_window_current_right_separator
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Make the status line pretty and add Catppuccin modules.
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_application}'
set -agF status-right '#{E:@catppuccin_status_cpu}'
set -agF status-right '#{E:@catppuccin_status_ram}'
set -ag status-right '#{E:@catppuccin_status_session}'
set -ag status-right '#{E:@catppuccin_status_uptime}'
set -agF status-right '#{E:@catppuccin_status_battery}'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Override vim-tmux-navigator's tmux-side pane navigation so tmux switches the
# macOS input source to ABC whenever the active pane changes from tmux.
bind-key -n C-h if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'" \
  "send-keys C-h" \
  "run-shell '/usr/local/bin/im-select com.apple.keylayout.ABC && tmux select-pane -L'"
bind-key -n C-j if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'" \
  "send-keys C-j" \
  "run-shell '/usr/local/bin/im-select com.apple.keylayout.ABC && tmux select-pane -D'"
bind-key -n C-k if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'" \
  "send-keys C-k" \
  "run-shell '/usr/local/bin/im-select com.apple.keylayout.ABC && tmux select-pane -U'"
bind-key -n C-l if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'" \
  "send-keys C-l" \
  "run-shell '/usr/local/bin/im-select com.apple.keylayout.ABC && tmux select-pane -R'"

bind-key -T copy-mode-vi C-h run-shell '/usr/local/bin/im-select com.apple.keylayout.ABC && tmux select-pane -L'
bind-key -T copy-mode-vi C-j run-shell '/usr/local/bin/im-select com.apple.keylayout.ABC && tmux select-pane -D'
bind-key -T copy-mode-vi C-k run-shell '/usr/local/bin/im-select com.apple.keylayout.ABC && tmux select-pane -U'
bind-key -T copy-mode-vi C-l run-shell '/usr/local/bin/im-select com.apple.keylayout.ABC && tmux select-pane -R'

set -as terminal-features 'xterm*:clipboard'
